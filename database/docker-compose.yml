version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: corelearn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corelearn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corelearn_secret}
      POSTGRES_DB: ${POSTGRES_DB:-corelearn_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corelearn}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
